version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-1234}
      POSTGRES_DB: TuColmadoDb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - tucolmadord-network
    restart: always

  gateway:
    build:
      context: .
      dockerfile: Dockerfile.gateway
    ports:
      - "8090:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - ReverseProxy__Clusters__api-cluster__Destinations__api-destination__Address=http://api:8080/
      - ReverseProxy__Clusters__auth-cluster__Destinations__auth-destination__Address=http://auth:3000/
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.tucolmado-gateway.rule=Host(`tucolmadord.synsetsolutions.com`)"
      - "traefik.http.routers.tucolmado-gateway.entrypoints=websecure"
      - "traefik.http.routers.tucolmado-gateway.tls.certresolver=letsencrypt"
      - "traefik.http.services.tucolmado-gateway.loadbalancer.server.port=8080"
    networks:
      - tucolmadord-network
      - dokploy-network
    depends_on:
      - api
      - auth
    restart: always

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Host=db;Database=TuColmadoDb;Username=postgres;Password=${DB_PASSWORD:-1234}
    networks:
      - tucolmadord-network
    depends_on:
      - db
    restart: always

  auth:
    build:
      context: ../tu_colmado_auth
      dockerfile: Dockerfile
    environment:
      - NODE_ENV=production
      - PORT=3000
    networks:
      - tucolmadord-network
    restart: always

networks:
  tucolmadord-network:
    driver: bridge
  dokploy-network:
    external: true

volumes:
  postgres_data:
