name: CI/CD Pipeline

on:
  pull_request:
    branches:
      - QA
      - master

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore TuColmadoRD.slnx

      - name: Build
        run: dotnet build TuColmadoRD.slnx --no-restore

      - name: Test
        run: dotnet test TuColmadoRD.slnx --no-build --verbosity normal

  integrate_to_master:
    needs: test
    if: github.event_name == 'pull_request' && github.base_ref == 'QA' && github.event.pull_request.merged == false
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up GitHub CLI
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create --base master --head ${{ github.head_ref }} --title "Auto-merge from QA pipeline" --body "" || echo "PR already exists"
          gh pr merge ${{ github.head_ref }} --auto --merge || echo "Could not auto-merge"

  deploy_to_server:
    needs: [test, integrate_to_master]
    if: always() && (github.ref == 'refs/heads/master' || github.event.pull_request.merged == true)
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via Dokploy Webhook or SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: server.synsetsolutions.com
          username: synset_server
          port: 2222
          password: "1011"
          script: |
            echo "Conectado al servidor exitosamente"
            # Si usas docker-compose manual:
            # cd ~/TuColmadoRD && git pull origin master && docker compose up -d --build
            # NOTA: Si usas Dokploy, Dokploy escucha a Github y auto-despliega de forma nativa sin requerir acción SSH.
