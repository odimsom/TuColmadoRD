name: CI/CD Pipeline

on:
  pull_request:
    branches:
      - Develop
      - QA
      - master
    types: [opened, synchronize, closed]

permissions:
  contents: write
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore TuColmadoRD.slnx

      - name: Build
        run: dotnet build TuColmadoRD.slnx --no-restore

      - name: Test
        run: dotnet test TuColmadoRD.slnx --no-build --verbosity normal

  integrate_to_qa:
    needs: test
    if: always() && !failure() && !cancelled() && github.event.pull_request.merged == true && github.base_ref == 'Develop'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Auto-propagate to QA
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create --base QA --head Develop --title "Auto-merge Develop to QA" --body "Automated promotion" || true
          gh pr merge Develop --auto --merge || true

  deploy_to_server:
    needs: integrate_to_qa
    if: always() && !failure() && !cancelled() && github.event.pull_request.merged == true && github.base_ref == 'QA'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: server.synsetsolutions.com
          username: synset_server
          port: 2222
          password: "1011"
          script: |
            if [ -d ~/TuColmadoRD ]; then
              cd ~/TuColmadoRD
              git fetch origin QA
              git checkout QA
              git pull origin QA
              docker compose up -d --build
            else
              git clone https://github.com/ODIMSOM/TuColmadoRD ~/TuColmadoRD
              cd ~/TuColmadoRD
              git checkout QA
              docker compose up -d --build
            fi

  integrate_to_master:
    needs: deploy_to_server
    if: always() && !failure() && !cancelled() && github.event.pull_request.merged == true && github.base_ref == 'QA'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Promote to Master only after successful deploy
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create --base master --head QA --title "Auto-merge QA to Master" --body "Automated promotion after successful deploy" || true
          gh pr merge QA --auto --merge || true
